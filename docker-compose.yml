services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-https://ocauafggjrqvopxjihas.supabase.co/auth/v1/.well-known/jwks.json}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-https://ocauafggjrqvopxjihas.supabase.co/auth/v1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_HOST: ${API_HOST:-localhost}
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
